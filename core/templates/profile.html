<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#0f172a;
            color:white;
        }

        .container{
            max-width:800px;
            margin:auto;
            padding:40px 20px;
        }

        .profile-card{
            background:#1e293b;
            padding:30px;
            border-radius:20px;
            text-align:center;
            margin-bottom:30px;
        }

        .profile-img{
            width:120px;
            height:120px;
            border-radius:50%;
            object-fit:cover;
            border:4px solid #38bdf8;
            margin-bottom:20px;
        }

        .post-card{
            background:#1e293b;
            padding:20px;
            border-radius:15px;
            margin-bottom:20px;
        }

        h1{
            margin-bottom:10px;
        }

        p{
            color:#cbd5e1;
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="profile-card">

            <img
                src="{{ profile_user.profile.image.url }}"
                class="profile-img"
            >

            <h1>
                {{ profile_user.username }}
            </h1>

            <p style="margin-top:15px;">
    {{ profile_user.profile.bio }}
</p>

<br>

<a href="/dashboard/">

    <button>
        ← Back to Dashboard
    </button>

</a>
            <p>
    Posts: {{ posts.count }}
</p>

<p>
    Followers: {{ profile_user.profile.followers.count }}
</p>

<p>
    Following: {{ profile_user.following.count }}
</p>

<br>

<a href="/follow/{{ profile_user.username }}/">

    <button>
        Follow / Unfollow
    </button>

</a>

        </div>

        {% for post in posts %}

        <div class="post-card">

            <p>
                {{ post.content }}
            </p>

        </div>

        {% endfor %}

    </div>

</body>
</html>
