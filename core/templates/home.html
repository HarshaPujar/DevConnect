<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevConnect</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#0f172a;
            color:white;
        }

        nav{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 60px;
            background:#111827;
        }

        .logo{
            font-size:30px;
            font-weight:bold;
            color:#38bdf8;
        }

        ul{
            display:flex;
            list-style:none;
            gap:30px;
        }

        .hero{
            height:85vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:20px;
        }

        h1{
            font-size:60px;
            margin-bottom:20px;
        }

        p{
            font-size:22px;
            color:#cbd5e1;
            max-width:700px;
        }

        button{
            margin-top:30px;
            padding:15px 35px;
            border:none;
            border-radius:12px;
            background:#38bdf8;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <nav>

        <div class="logo">
            DevConnect
        </div>

        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Projects</li>
            <li>Contact</li>
        </ul>

    </nav>

    <section class="hero">

        <h1>
            Build Your Developer Identity 🚀
        </h1>

        <p>
            Create your portfolio, share projects,
            connect with developers and grow your career.
        </p>

        <a href="/about/">
    <button>
        Get Started
    </button>
</a>
<br><br>

<a href="/login/">
    <button>
        Login
    </button>
</a>

    </section>

</body>
</html>
