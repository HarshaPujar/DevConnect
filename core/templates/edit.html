<!DOCTYPE html>
<html>
<head>
    <title>Edit Post</title>

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:#1e293b;
            padding:40px;
            border-radius:15px;
            width:400px;
        }

        textarea{
            width:100%;
            height:150px;
            padding:10px;
            border:none;
            border-radius:10px;
            margin-top:20px;
        }

        button{
            margin-top:20px;
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#38bdf8;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>Edit Post ✏️</h1>

        <form method="POST">

            {% csrf_token %}

            <textarea
                name="content"
            >{{ post.content }}</textarea>

            <button type="submit">
                Update
            </button>

        </form>

    </div>

</body>
</html>
