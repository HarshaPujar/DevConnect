<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <style>

        body{
            background:#0f172a;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:#1e293b;
            padding:40px;
            border-radius:15px;
            width:350px;
        }

        h1{
            color:white;
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#38bdf8;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>Signup</h1>

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Username"
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
            >

            <button>
                Signup
            </button>

        </form>

    </div>

</body>
</html>
